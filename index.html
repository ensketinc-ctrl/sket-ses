<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SKET マッチングツール</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#F7F8FA;font-family:system-ui,-apple-system,sans-serif;color:#1A1D23;font-size:14px;line-height:1.5}
.hdr{background:#1A1D23;color:#fff;padding:10px 16px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:50}
.hdr-title{font-size:16px;font-weight:700}.hdr-sub{font-size:12px;color:#9CA3AF}
.hdr-stats{margin-left:auto;display:flex;gap:16px}
.sv{font-size:17px;font-weight:700;text-align:right}.sl{font-size:11px;color:#9CA3AF;text-align:right}
.hbtn{background:rgba(255,255,255,.15);border:none;color:#fff;padding:5px 12px;border-radius:6px;font-size:12px;cursor:pointer}
.tabs{display:flex;background:#fff;border-bottom:1px solid #E4E6EA;padding:0 12px;overflow-x:auto;position:sticky;top:46px;z-index:40}
.tab{padding:10px 14px;font-size:13px;font-weight:500;cursor:pointer;border:none;background:none;color:#6B7280;border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap}
.tab.on{color:#1A1D23;border-color:#1A1D23;font-weight:600}
.sec{display:none}.sec.on{display:block}
.two-pane{display:flex;min-height:calc(100vh - 120px)}
.lpane{width:260px;flex-shrink:0;border-right:1px solid #E4E6EA;background:#fff}
.rpane{flex:1;padding:14px;background:#F7F8FA}
.ph{padding:10px 14px;border-bottom:1px solid #E4E6EA;font-size:12px;font-weight:600;color:#6B7280;text-transform:uppercase;letter-spacing:.5px}
.ps{padding:8px;border-bottom:1px solid #E4E6EA}
.pli{padding:10px 14px;border-bottom:1px solid #E4E6EA;cursor:pointer}
.pli:hover{background:#F7F8FA}.pli.on{background:#EFF6FF;border-left:3px solid #2563EB}
.pli-n{font-size:13px;font-weight:500;margin-bottom:2px;line-height:1.3}
.pli-s{font-size:12px;color:#6B7280}
.sc-list{display:flex;flex-direction:column;gap:10px}
.sc{background:#fff;border:1px solid #E4E6EA;border-radius:10px;padding:14px;cursor:pointer}
.sc:hover{box-shadow:0 2px 8px rgba(0,0,0,.06)}
.sc-top{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.sc-rank{width:22px;height:22px;border-radius:50%;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;background:#F7F8FA;color:#6B7280;flex-shrink:0}
.r1{background:#FFD700!important;color:#7A5C00!important}
.r2{background:#E0E0E0!important;color:#555!important}
.r3{background:#D4A574!important;color:#5C3A1E!important}
.sc-name{font-size:14px;font-weight:600;flex:1;line-height:1.3}
.sc-score{font-size:20px;font-weight:800;min-width:44px;text-align:right}
.brow{display:flex;align-items:center;gap:6px;margin-bottom:5px}
.blbl{font-size:11px;color:#6B7280;width:44px;flex-shrink:0}
.bout{flex:1;height:6px;background:#E4E6EA;border-radius:3px}
.bin{height:6px;border-radius:3px}
.bval{font-size:11px;color:#6B7280;min-width:28px;text-align:right}
.sc-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:7px}
.stag{font-size:11px;padding:3px 8px;border-radius:20px;font-weight:500}
.stag.hit{background:#E8F7F2;color:#0F9D6E}
.stag.part{background:#FFFBEB;color:#D97706}
.stag.miss{background:#F7F8FA;color:#6B7280;border:1px solid #E4E6EA}
.srcb{font-size:10px;padding:2px 7px;border-radius:20px;font-weight:700;letter-spacing:.3px}
.srcb.ai{background:#EEF2FF;color:#4338CA}
.srcb.rule{background:#F3F4F6;color:#6B7280}
.ubadge{display:inline-block;font-size:11px;padding:3px 9px;border-radius:20px;font-weight:700;white-space:nowrap}
.propbtn{font-size:11px;padding:4px 12px;border-radius:20px;font-weight:700;border:none;cursor:pointer}
.propbtn:hover{filter:brightness(0.94)}
.hotsum{display:flex;gap:6px;flex-wrap:wrap;padding:8px 14px;background:#fff;border-bottom:1px solid #E4E6EA}
.hotsum span{font-size:11px;padding:4px 10px;border-radius:20px;font-weight:700}
.sc-meta{display:flex;flex-wrap:wrap;gap:10px;margin-top:8px;padding-top:8px;border-top:1px solid #E4E6EA}
.sc-meta span{font-size:12px;color:#6B7280}.sc-meta strong{color:#1A1D23}
.sc-act{margin-top:10px;display:flex;gap:6px}
.lbar{padding:10px 14px;background:#fff;border-bottom:1px solid #E4E6EA;display:flex;gap:6px;flex-wrap:wrap}
.lgrid{padding:14px;display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px}
.card{background:#fff;border:1px solid #E4E6EA;border-radius:10px;padding:13px}
.ct{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}
.cn{font-size:13px;font-weight:600;flex:1;margin-right:8px;line-height:1.4}
.badge{font-size:11px;padding:3px 9px;border-radius:20px;font-weight:600;white-space:nowrap;flex-shrink:0}
.bg-g{background:#E8F7F2;color:#0F9D6E}
.bg-a{background:#FFFBEB;color:#D97706}
.bg-p{background:#F5F3FF;color:#7C3AED}
.tags{display:flex;flex-wrap:wrap;gap:4px;margin:6px 0}
.tag{font-size:11px;padding:3px 8px;background:#F7F8FA;border:1px solid #E4E6EA;border-radius:6px;color:#6B7280}
.mr{display:flex;flex-wrap:wrap;gap:8px}
.meta{font-size:12px;color:#6B7280}.meta strong{color:#1A1D23}
.fb{font-size:11px;padding:3px 9px;border-radius:20px;font-weight:600;white-space:nowrap;display:inline-block}
.fn{background:#E8F7F2;color:#0F9D6E}
.fw{background:#FFFBEB;color:#D97706}
.fo{background:#FEF2F2;color:#DC2626}
.stbtn{font-size:11px;padding:3px 9px;border-radius:20px;font-weight:600;cursor:pointer;border:none;display:inline-block}
.sa{background:#E8F7F2;color:#0F9D6E}
.sp2{background:#EFF6FF;color:#2563EB}
.sc3{background:#F3F4F6;color:#4B5563}
.si{width:100%;padding:7px 10px;border:1px solid #E4E6EA;border-radius:7px;font-size:13px;background:#F7F8FA;color:#1A1D23}
.si:focus{outline:none;border-color:#2563EB}
.pbody{padding:14px;max-width:860px;margin:0 auto}
.pbox{background:#fff;border:1px solid #E4E6EA;border-radius:10px;padding:14px;margin-bottom:12px}
.ptitle{font-size:16px;font-weight:700;margin-bottom:6px}
.pdesc{font-size:12px;color:#6B7280;margin-bottom:12px;line-height:1.5}
.desctoggle{font-size:11px;color:#2563EB;background:none;border:none;cursor:pointer;padding:0;margin:6px 0 0;text-align:left;font-weight:600}
.desctoggle:hover{text-decoration:underline}
.descbox{font-size:12px;color:#4B5563;line-height:1.7;background:#F7F8FA;border-radius:8px;padding:10px;margin-top:6px;white-space:pre-wrap;display:none}
.descbox.show{display:block}
textarea{width:100%;min-height:200px;padding:9px;border:1px solid #E4E6EA;border-radius:7px;font-size:13px;resize:vertical;background:#F7F8FA;color:#1A1D23;line-height:1.6;font-family:inherit}
textarea:focus{outline:none;border-color:#2563EB}
.pr{margin-top:8px;padding:10px;background:#F7F8FA;border-radius:7px;font-size:12px;line-height:1.8;white-space:pre-wrap;max-height:160px;overflow-y:auto;display:none}
.pr.show{display:block}
.btn{padding:6px 12px;border:none;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer}
.btn-d{background:#1A1D23;color:#fff}.btn-d:hover{opacity:.8}
.btn-l{background:#F7F8FA;border:1px solid #E4E6EA;color:#1A1D23}.btn-l:hover{background:#E4E6EA}
.mow{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;align-items:center;justify-content:center;z-index:200;padding:16px}
.mow.show{display:flex}
.modal{background:#fff;border-radius:14px;width:100%;max-width:560px;max-height:85vh;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.mh{padding:14px 18px;border-bottom:1px solid #E4E6EA;display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.mt2{font-size:14px;font-weight:700}
.mc{background:none;border:none;font-size:24px;cursor:pointer;color:#6B7280}
.mb{padding:16px 18px;overflow-y:auto;flex:1}
.mf{padding:10px 18px;border-top:1px solid #E4E6EA;display:flex;gap:6px;justify-content:flex-end;flex-shrink:0}
.dsec{margin-bottom:14px}
.dsh{font-size:12px;font-weight:600;color:#6B7280;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;padding-bottom:4px;border-bottom:1px solid #E4E6EA}
.drow{display:flex;gap:8px;margin-bottom:5px;font-size:13px}
.dlbl{color:#6B7280;min-width:70px;flex-shrink:0;font-size:12px}
.dval{color:#1A1D23;font-weight:500;flex:1}
.dtags{display:flex;flex-wrap:wrap;gap:4px;margin:4px 0 8px}
.dtag{font-size:12px;padding:3px 9px;border-radius:20px;font-weight:500}
.dtag.hit{background:#E8F7F2;color:#0F9D6E}
.dtag.part{background:#FFFBEB;color:#D97706}
.dtag.miss{background:#FEF2F2;color:#DC2626}
.dtag.neu{background:#F5F3FF;color:#7C3AED}
.ssum{display:flex;gap:10px;background:#F7F8FA;border-radius:8px;padding:12px;margin-bottom:14px}
.sblk{flex:1;text-align:center}
.sblkv{font-size:22px;font-weight:800}
.sblkl{font-size:11px;color:#6B7280;margin-top:2px}
.cpbtn{width:100%;padding:10px 14px;background:#F7F8FA;border:1px dashed #E4E6EA;border-radius:8px;font-size:13px;color:#6B7280;cursor:pointer;text-align:left;margin-top:8px;line-height:1.7}
.cpbtn:hover{background:#EFF6FF;border-color:#BFDBFE;color:#1E40AF}
.gbox{max-width:600px;margin:20px auto;padding:0 14px}
.gi{background:#fff;border:1px solid #E4E6EA;border-radius:10px;padding:16px;margin-bottom:12px}
.gt{font-size:14px;font-weight:700;margin-bottom:8px}
.gd{font-size:12px;color:#6B7280;line-height:1.8;margin-bottom:12px}
.gs{background:#F7F8FA;border-radius:8px;padding:12px;font-size:12px;line-height:2;color:#6B7280;margin-top:10px}
.abanner{background:#FFF7ED;border:1px solid #FED7AA;border-radius:10px;padding:14px;margin:14px;font-size:13px}
.prev-item{background:#F7F8FA;border:1px solid #E4E6EA;border-radius:8px;padding:10px 12px;margin-bottom:8px}
.spin{display:inline-block;width:14px;height:14px;border:2px solid #E4E6EA;border-top-color:#1A1D23;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:50px;color:#6B7280;font-size:13px}
@media(max-width:600px){.two-pane{flex-direction:column}.lpane{width:100%;border-right:none;border-bottom:1px solid #E4E6EA}}
</style>
</head>
<body>

<div class="hdr">
  <div><div class="hdr-title">SKET マッチングツール</div><div class="hdr-sub">SES案件 x 要員 自動マッチング</div></div>
  <div class="hdr-stats">
    <div><div class="sv" id="sp">-</div><div class="sl">案件</div></div>
    <div><div class="sv" id="ss">-</div><div class="sl">要員</div></div>
    <div><div class="sv" id="su">-</div><div class="sl">更新</div></div>
  </div>
  <button class="hbtn" onclick="loadData()">↻ 再読込</button>
</div>

<div class="tabs">
  <button class="tab on" onclick="doTab(this)" data-tab="hot">🔥 ホットマッチ</button>
  <button class="tab" onclick="doTab(this)" data-tab="match">マッチング</button>
  <button class="tab" onclick="doTab(this)" data-tab="rev">逆引き検索</button>
  <button class="tab" onclick="doTab(this)" data-tab="bp">📤 BPへ一斉送信</button>
  <button class="tab" onclick="doTab(this)" data-tab="projs">案件一覧</button>
  <button class="tab" onclick="doTab(this)" data-tab="staffs">要員一覧</button>
  <button class="tab" onclick="doTab(this)" data-tab="paste">情報追加</button>
</div>

<div id="tab-hot" class="sec on">
  <div class="lbar">
    <span style="font-size:12px;color:#6B7280;white-space:nowrap;align-self:center">マッチ度</span>
    <select class="si" style="width:100px" onchange="hotState.min=parseInt(this.value);renderHot()">
      <option value="80">80点以上</option>
      <option value="75" selected>75点以上</option>
      <option value="70">70点以上</option>
      <option value="65">65点以上</option>
      <option value="55">55点以上</option>
    </select>
    <select class="si" style="width:150px" onchange="hotState.sort=this.value;renderHot()">
      <option value="score">並び：マッチ度順</option>
      <option value="profit">並び：粗利が大きい順</option>
      <option value="close">並び：惜しい順（交渉圏）</option>
    </select>
    <select class="si" style="width:170px" onchange="hotState.unit=this.value;renderHot()">
      <option value="">単価：全て表示</option>
      <option value="fit">単価内（即提案）のみ</option>
      <option value="fitnego">単価内＋交渉圏（10万以内）</option>
      <option value="nego">交渉圏（10万以内オーバー）のみ</option>
      <option value="unknown">単価未定のみ</option>
    </select>
    <input class="si" style="flex:1;min-width:120px" placeholder="案件名・要員名・スキルで絞り込み..." oninput="hotState.q=this.value;renderHot()">
    <select class="si" style="width:150px" onchange="hotState.prop=this.value;renderHot()">
      <option value="未提案" selected>未提案のみ</option>
      <option value="">提案状況：全て</option>
      <option value="提案中">提案中のみ</option>
      <option value="成約">成約のみ</option>
      <option value="見送り">見送りのみ</option>
    </select>
    <select class="si" style="width:120px" onchange="hotState.src=this.value;renderHot()">
      <option value="">スコア:全て</option><option value="ai">AI採点済のみ</option><option value="rule">未採点(ルール)のみ</option>
    </select>
    <select class="si" style="width:100px" onchange="hotState.limit=parseInt(this.value);renderHot()">
      <option value="30">上位30件</option><option value="60" selected>上位60件</option><option value="150">上位150件</option><option value="9999">全件</option>
    </select>
  </div>
  <div class="hotsum" id="hotsum"></div>
  <div style="padding:8px 14px;font-size:12px;color:#6B7280;background:#fff;border-bottom:1px solid #E4E6EA" id="hotinfo"></div>
  <div class="lgrid" id="hotgrid"><div class="empty"><span class="spin"></span>計算中</div></div>
</div>

<div id="tab-match" class="sec">
  <div class="two-pane">
    <div class="lpane">
      <div class="ph">要員を選択</div>
      <div class="ps">
        <input class="si" placeholder="名前・スキルで検索..." oninput="matchStaffState.q=this.value;applyMatchStaffFilter()">
        <select class="si" style="margin-top:6px" onchange="matchStaffState.fresh=this.value;applyMatchStaffFilter()">
          <option value="">登録日からの経過:全て</option><option value="new">直近(2週間以内)</option><option value="warn">要確認(1ヶ月)</option><option value="old">期限切れ</option>
        </select>
        <label style="display:flex;align-items:center;gap:5px;margin-top:6px;font-size:12px;color:#6B7280;cursor:pointer">
          <input type="checkbox" checked onchange="matchStaffState.hideClosed=this.checked;applyMatchStaffFilter()">終了を隠す
        </label>
      </div>
      <div id="slst"><div class="empty"><span class="spin"></span>読み込み中</div></div>
    </div>
    <div class="rpane" id="mres"><div class="empty">左の要員を選択してください</div></div>
  </div>
</div>

<div id="tab-rev" class="sec">
  <div class="two-pane">
    <div class="lpane">
      <div class="ph">案件を選択</div>
      <div class="ps">
        <input class="si" placeholder="案件名・スキルで検索..." oninput="revProjState.q=this.value;applyRevProjFilter()">
        <select class="si" style="margin-top:6px" onchange="revProjState.fresh=this.value;applyRevProjFilter()">
          <option value="">登録日からの経過:全て</option><option value="new">直近(2週間以内)</option><option value="warn">要確認(1ヶ月)</option><option value="old">期限切れ</option>
        </select>
        <label style="display:flex;align-items:center;gap:5px;margin-top:6px;font-size:12px;color:#6B7280;cursor:pointer">
          <input type="checkbox" checked onchange="revProjState.hideClosed=this.checked;applyRevProjFilter()">終了を隠す
        </label>
      </div>
      <div id="plst"><div class="empty"><span class="spin"></span>読み込み中</div></div>
    </div>
    <div class="rpane" id="rres"><div class="empty">左の案件を選択してください</div></div>
  </div>
</div>

<div id="tab-bp" class="sec">
  <div class="lbar">
    <select class="si" style="width:200px" onchange="bpState.mode=this.value;renderBP()">
      <option value="unsent">未送信があるBPのみ</option>
      <option value="all">全てのBP</option>
      <option value="none">流せるBPがない案件</option>
    </select>
    <input class="si" style="flex:1;min-width:120px" placeholder="BP名・案件名・要員名で絞り込み..." oninput="bpState.q=this.value;renderBP()">
  </div>
  <div style="padding:8px 14px;font-size:12px;color:#6B7280;background:#fff;border-bottom:1px solid #E4E6EA" id="bpinfo"></div>
  <div class="lgrid" id="bpgrid"><div class="empty"><span class="spin"></span>計算中</div></div>
</div>

<div id="tab-projs" class="sec">
  <div class="lbar">
    <input class="si" style="flex:1;min-width:120px" placeholder="案件名・スキルで検索..." oninput="pFilterState.q=this.value;applyPFilter()">
    <select class="si" style="width:90px" onchange="pFilterState.remote=this.value;applyPFilter()">
      <option value="">勤務:全て</option><option value="r">リモート可</option><option value="s">常駐</option>
    </select>
    <select class="si" style="width:90px" onchange="pFilterState.status=this.value;applyPFilter()">
      <option value="">状態:全て</option><option value="active">募集中</option><option value="proposing">提案中</option><option value="closed">終了</option>
    </select>
    <select class="si" style="width:150px" onchange="pFilterState.fresh=this.value;applyPFilter()">
      <option value="">登録日からの経過:全て</option><option value="new">直近(2週間以内)</option><option value="warn">要確認(1ヶ月)</option><option value="old">期限切れ</option>
    </select>
    <select class="si" style="width:110px" onchange="pFilterState.sort=this.value;applyPFilter()">
      <option value="new">新着順</option><option value="unit_desc">単価高い順</option><option value="unit_asc">単価低い順</option><option value="name">名前順</option>
    </select>
  </div>
  <div class="lgrid" id="pgrid"></div>
</div>

<div id="tab-staffs" class="sec">
  <div class="lbar">
    <input class="si" style="flex:1;min-width:120px" placeholder="名前・スキルで検索..." oninput="sFilterState.q=this.value;applySFilter()">
    <select class="si" style="width:100px" onchange="sFilterState.remote=this.value;applySFilter()">
      <option value="">希望:全て</option><option value="r">リモート希望</option><option value="s">常駐可</option>
    </select>
    <select class="si" style="width:90px" onchange="sFilterState.status=this.value;applySFilter()">
      <option value="">状態:全て</option><option value="active">募集中</option><option value="proposing">提案中</option><option value="closed">終了</option>
    </select>
    <select class="si" style="width:150px" onchange="sFilterState.fresh=this.value;applySFilter()">
      <option value="">登録日からの経過:全て</option><option value="new">直近(2週間以内)</option><option value="warn">要確認(1ヶ月)</option><option value="old">期限切れ</option>
    </select>
    <select class="si" style="width:110px" onchange="sFilterState.sort=this.value;applySFilter()">
      <option value="new">新着順</option><option value="unit_desc">単価高い順</option><option value="unit_asc">単価低い順</option><option value="name">名前順</option>
    </select>
  </div>
  <div class="lgrid" id="sgrid"></div>
</div>

<div id="tab-paste" class="sec">
  <div style="padding:10px 14px;background:#fff;border-bottom:1px solid #E4E6EA;font-size:13px;color:#6B7280">
    案件でも要員でも混在でも複数件でも、そのまま貼り付けるだけ。AIが自動識別してDBとスプレッドシートに追加します
  </div>
  <div class="pbody">
    <div class="pbox">
      <div class="ptitle">なんでも貼り付けてください</div>
      <div class="pdesc">案件・要員・複数件混在・配信番号付き、どんな形式でもOKです。AIが自動で識別して振り分けます。</div>

function getAllSt() { try { return JSON.parse(localStorage.getItem('sket_st') || '{}'); } catch(e) { return {}; } }

// 稼働時期を「今月からの月数」に変換（即日/随時 = 0、不明 = null）
function startMonth_(str) {
  var s = String(str || '');
  if (!s) return null;
  if (/即日|随時|すぐ|即時/.test(s)) return 0;
  var now = new Date();
  var m = s.match(/(\d{4})\s*[年\/\-]\s*(\d{1,2})/);
  if (m) {
    return (parseInt(m[1],10) - now.getFullYear()) * 12 + (parseInt(m[2],10) - 1 - now.getMonth());
  }
  var m2 = s.match(/(\d{1,2})\s*月/);
  if (m2) {
    var d = parseInt(m2[1],10) - 1 - now.getMonth();
    return d < -6 ? d + 12 : d; // 年跨ぎ補正
  }
  return null;
}

// ===========================================================================
// スコア設計（合計100点）
//   スキル 50 / 単価 20 / 稼働時期 15 / 働き方 15
//   ・必須スキルは重み付き。完全一致=1.0、同カテゴリ一致=0.4の部分点
//   ・尚可スキルは加点のみ（分母に入れない）
//   ・必須スキル一致ゼロの場合は総合25点で頭打ち（＝下駄の撤廃）
// ===========================================================================
function calcScore(s, p) {
  var sset = {}, scats = {};
  (s.skills || []).forEach(function(x) {
    var k = normSkill_(x); sset[k] = true;
    var c = skillCat_(k); if (c) scats[c] = true;
  });

  var hit = [], part = [], miss = [];
  var gotW = 0, allW = 0;
  (p.skills || []).forEach(function(ps) {
    var k = normSkill_(ps);
    var w = skillWeight_(k);
    allW += w;
    if (sset[k]) { hit.push(ps); gotW += w; }
    else if (skillCat_(k) && scats[skillCat_(k)]) { part.push(ps); gotW += w * 0.4; }
    else { miss.push(ps); }
  });
  var skillPts = allW > 0 ? Math.round(gotW / allW * 50) : 0;

  // 尚可スキル：加点のみ（最大5点）
  var prefHit = (p.skills_pref || []).filter(function(x) { return sset[normSkill_(x)]; });
  var prefPts = (p.skills_pref && p.skills_pref.length)
    ? Math.min(5, Math.round(prefHit.length / p.skills_pref.length * 5)) : 0;
  skillPts = Math.min(50, skillPts + prefPts);

  // ---- 単価（20点）----
  var umax = (typeof p.unit_max === 'number' && p.unit_max > 0) ? p.unit_max : null;
  var umin = (typeof s.unit_min === 'number' && s.unit_min > 0) ? s.unit_min : 60;
  var unitPts, unitNote = null;
  if (umax === null) { unitPts = 12; unitNote = '案件単価が不明（スキル見合い等）'; }
  else {
    var diff = umax - umin;
    if (diff >= 15)      unitPts = 20;              // 粗利十分
    else if (diff >= 0)  unitPts = 16;              // 収まる
    else if (diff >= -5) { unitPts = 8;  unitNote = '要交渉（' + (-diff) + '万オーバー）'; }
    else if (diff >= -15){ unitPts = 3;  unitNote = '単価オーバー（' + (-diff) + '万）'; }
    else                 { unitPts = 0;  unitNote = '単価が大きくオーバー（' + (-diff) + '万）'; }
  }

  // ---- 稼働時期（15点）----
  var pm = startMonth_(p.start), sm = startMonth_(s.start);
  var timePts, timeNote = null;
  if (pm === null || sm === null) { timePts = 8; timeNote = '稼働時期が不明'; }
  else {
    var lag = sm - pm; // 要員が案件開始より何ヶ月遅いか
    if (lag <= 0)      timePts = 15;
    else if (lag === 1){ timePts = 10; timeNote = '要員の稼働が1ヶ月遅い'; }
    else if (lag === 2){ timePts = 4;  timeNote = '要員の稼働が2ヶ月遅い'; }
    else               { timePts = 0;  timeNote = '稼働時期が合わない（' + lag + 'ヶ月遅れ）'; }
  }

  // ---- 働き方（15点）----
  // s.work_pref: 'remote'(リモート希望) / 'flex'(出社も可) / 'onsite'(常駐希望) / 'unknown'(記載なし=柔軟扱い)
  var mode = p.remote || '要確認';
  var pref = s.work_pref || (s.remote ? 'remote' : 'unknown');
  var isOnsite = (mode === '常駐');
  var isHybrid = (mode === 'ハイブリッド');
  var workPts, locNote = null;

  function byLocation_() {
    if (!p.location || !s.location) { locNote = '勤務地情報なし'; return 8; }
    if (p.location === s.location) return 15;
    locNote = p.location + '⇔' + s.location + '（勤務地不一致）';
    return 2;
  }
  if (isOnsite) {
    if (pref === 'remote') { workPts = 0; locNote = '常駐案件 × リモート希望の要員'; }
    else workPts = byLocation_();
  } else if (isHybrid) {
    if (pref === 'remote') { workPts = 6; locNote = 'ハイブリッド案件 × リモート希望の要員（出社頻度の確認要）'; }
    else workPts = byLocation_();
  } else {
    // フルリモート案件：常駐希望の要員はやや減点
    workPts = (pref === 'onsite') ? 10 : 15;
  }

  var total = skillPts + unitPts + timePts + workPts;
  // 必須スキルが1つも当たっていない場合は上限25点（＝下駄の撤廃）
  if (skillPts === 0 && (p.skills || []).length > 0) total = Math.min(total, 25);

  return {
    total: total, skillPts: skillPts, unitPts: unitPts, timePts: timePts, workPts: workPts,
    hit: hit, part: part, miss: miss, prefHit: prefHit,
    locNote: locNote, unitNote: unitNote, timeNote: timeNote,
    src: 'rule'
  };
}

// AI採点済みスコアがあればそれを優先し、内訳はルールベースのものを流用する
function getScore(s, p) {
  var r = calcScore(s, p);
  var ai = SCORES[p.id + '_' + s.id];
  if (ai && typeof ai.s === 'number' && ai.s > 0) {
    r.ruleTotal = r.total;
    r.total = ai.s;
    r.reason = ai.r || '';
    r.src = 'ai';
  }
  return r;
}
function scColor_(t) { return t >= 70 ? '#0F9D6E' : t >= 50 ? '#D97706' : '#6B7280'; }

// ===========================================================================
// 提案ステータス（案件 × 要員 のペア単位）
//   未提案 → 提案中 → 成約 → 見送り → 単価NG → 未提案 とサイクル
//   「提案メールを生成」した時点で自動的に「提案中」になる（追加操作ゼロ）
// ===========================================================================
var PROP_CYCLE = ['未提案', '提案中', '成約', '見送り', '単価NG'];
var PROP_STYLE = {
  '未提案': { bg:'#F3F4F6', fg:'#4B5563' },
  '提案中': { bg:'#DBEAFE', fg:'#1D4ED8' },
  '成約'  : { bg:'#D1FAE5', fg:'#047857' },
  '見送り': { bg:'#FEE2E2', fg:'#B91C1C' },
  '単価NG': { bg:'#FFEDD5', fg:'#C2410C' }
};
function getProp(pid, sid) {
  var v = SCORES[pid + '_' + sid];
  return (v && v.st) ? v.st : '未提案';
}
function setProp(pid, sid, status, silent) {
  var k = pid + '_' + sid;
  if (!SCORES[k]) SCORES[k] = { s: 0, r: '' };
  SCORES[k].st = status;
  SCORES[k].sd = (status === '未提案') ? '' : new Date().toLocaleDateString('ja-JP');
  if (!GAS_URL) return;
  fetch(GAS_URL, { method:'POST', headers:{'Content-Type':'text/plain'},
    body: JSON.stringify({ type:'propose', pid: pid, sid: sid, status: status }) })
    .catch(function() { if (!silent) alert('提案ステータスの保存に失敗しました'); });
}
function propBtn_(pid, sid) {
  var st = getProp(pid, sid), s = PROP_STYLE[st] || PROP_STYLE['未提案'];
  return '<button class="propbtn" style="background:' + s.bg + ';color:' + s.fg + '" '
    + 'data-pid="' + pid + '" data-sid="' + sid + '" '
    + 'onclick="event.stopPropagation();cycleProp(this)">' + st + '</button>';
}
function cycleProp(btn) {
  var pid = Number(btn.dataset.pid), sid = Number(btn.dataset.sid);
  var cur = getProp(pid, sid);
  var next = PROP_CYCLE[(PROP_CYCLE.indexOf(cur) + 1) % PROP_CYCLE.length];
  setProp(pid, sid, next);
  var s = PROP_STYLE[next];
  btn.textContent = next; btn.style.background = s.bg; btn.style.color = s.fg;
}

// ===========================================================================
// 📤 BP配信：案件を「要員を出せるBP」にLINEで流す
//   ・BP単位で表示し、そのBPに未配信の案件をまとめて1つの文面にできる
//   ・配信履歴は (案件ID × BP名) のペア単位で記録（1案件を複数BPに流すため）
// ===========================================================================
var BP_THRESHOLD = 0.5;
var bpState = { mode: 'unsent', q: '' };

function bpMatchRate_(p, bp) {
  var req = (p.skills || []).map(normSkill_);
  if (!req.length) return 0;
  var pool = {};
  (bp.skills || []).forEach(function(s) { pool[normSkill_(s)] = true; });
  var hit = req.filter(function(r) { return pool[r]; }).length;
  return hit / req.length;
}
function isSent_(kind, id, bpName) { return SENT[kind + '_' + id + '_' + bpName] || ''; }

function renderBP() {
  var grid = document.getElementById('bpgrid');
  var info = document.getElementById('bpinfo');
  if (!grid) return;
  if (!BPS.length) {
    grid.innerHTML = '<div class="empty">BPリストがありません。<br><br>スプレッドシートのApps Scriptで <strong>buildBPList()</strong> を実行してください。</div>';
    info.textContent = ''; return;
  }
  var ps = PROJECTS.filter(function(p) { return getSt('project', p.id) !== 'closed'; });
  var st = STAFF.filter(function(s) { return getSt('staff', s.id) !== 'closed'; });
  var bps = BPS.filter(function(b) { return b.count > 0; });

  // BPごとに「送る案件」「送る要員」を集める
  var cards = bps.map(function(bp) {
    var pj = ps.map(function(p) { return { p: p, rate: bpMatchRate_(p, bp) }; })
               .filter(function(x) { return x.rate >= BP_THRESHOLD; })
               .sort(function(a, b) { return b.rate - a.rate; });
    var pjU = pj.filter(function(x) { return !isSent_('案件', x.p.id, bp.name); });
    // 要員：そのBP自身の所属は除外（自分の人を自分に送らない）
    var sf  = st.filter(function(s) { return s.source !== bp.name; });
    var sfU = sf.filter(function(s) { return !isSent_('要員', s.id, bp.name); });
    return { bp: bp, pj: pj, pjU: pjU, sf: sf, sfU: sfU };
  });

  var orphan = ps.filter(function(p) {
    return !bps.some(function(bp) { return bpMatchRate_(p, bp) >= BP_THRESHOLD; });
  });

  var totP = cards.reduce(function(a, c) { return a + c.pjU.length; }, 0);
  var totS = cards.reduce(function(a, c) { return a + c.sfU.length; }, 0);
  info.innerHTML = 'BP <strong>' + bps.length + '</strong>社 ／ 有効案件 <strong>' + ps.length + '</strong>件 ／ 有効要員 <strong>' + st.length + '</strong>名'
    + ' ／ <strong style="color:#7C3AED">未送信：案件 ' + totP + '件・要員 ' + totS + '名</strong>'
    + ' ／ <strong style="color:#DC2626">流せるBPがない案件: ' + orphan.length + '件</strong>'
    + '<div style="margin-top:3px;font-size:11px;color:#9CA3AF">BPには案件情報と要員情報を一斉に送ります。'
    + '案件＝「対応できる人はいますか？」／要員＝「この人に合う案件はありますか？」</div>';

  if (bpState.mode === 'none') {
    if (!orphan.length) { grid.innerHTML = '<div class="empty">流せるBPがない案件はありません</div>'; return; }
    grid.innerHTML = orphan.map(function(p) {
      var h = '<div class="card" style="border-left:4px solid #DC2626">';
      h += '<div style="font-size:13px;font-weight:700;margin-bottom:4px">' + p.name + '</div>';
      h += '<div class="sc-tags">' + (p.skills||[]).map(function(s){ return '<span class="stag miss">' + s + '</span>'; }).join('') + '</div>';
      h += '<div class="mr" style="margin-top:6px"><div class="meta">単価: <strong>' + p.unit + '</strong></div><div class="meta">案件元: <strong>' + p.source + '</strong></div></div>';
      h += '<div style="font-size:12px;color:#DC2626;background:#FEF2F2;border-radius:6px;padding:8px;margin-top:6px">⚠ このスキルの要員を持つBPがありません。<strong>新規開拓が必要です。</strong></div>';
      h += '<button class="btn btn-d" style="margin-top:8px;width:100%" onclick="copyOneProj(' + p.id + ')">📋 この案件の文面をコピー（新規BP打診用）</button>';
      h += '</div>';
      return h;
    }).join('');
    return;
  }

  var show = cards.filter(function(c) {
    if (bpState.mode === 'unsent' && !c.pjU.length && !c.sfU.length) return false;
    if (bpState.q) {
      var q = bpState.q.toLowerCase();
      var hay = (c.bp.name + ' ' + c.pj.map(function(x){return x.p.name;}).join(' ') + ' ' + c.sf.map(function(s){return s.name;}).join(' ')).toLowerCase();
      if (hay.indexOf(q) < 0) return false;
    }
    return true;
  }).sort(function(a, b) { return (b.pjU.length + b.sfU.length) - (a.pjU.length + a.sfU.length); });

  if (!show.length) { grid.innerHTML = '<div class="empty">未送信のBPはありません。すべて送信済みです。</div>'; return; }

  grid.innerHTML = show.map(function(c) {
    var bp = c.bp;
    var esc = bp.name.replace(/'/g, "\\'");
    var h = '<div class="card" style="border-left:4px solid #7C3AED">';
    h += '<div class="ct"><div class="cn">' + bp.name + '</div><span class="badge bg-g">保有要員 ' + bp.count + '名</span></div>';
    h += '<div style="font-size:11px;color:#6B7280;margin:2px 0 8px">' + (bp.way || '連絡方法未設定') + ' ／ 得意: ' + (bp.skills||[]).slice(0,6).join(', ') + '</div>';

    // 案件
    h += '<div style="font-size:12px;font-weight:700;color:#7C3AED;margin:8px 0 4px">📄 送る案件 ' + c.pjU.length + '件'
       + (c.pj.length > c.pjU.length ? '<span style="font-weight:400;color:#9CA3AF">（送信済 ' + (c.pj.length - c.pjU.length) + '件）</span>' : '') + '</div>';
    if (!c.pjU.length) h += '<div style="font-size:11px;color:#9CA3AF">未送信の案件はありません</div>';
    c.pjU.slice(0, 5).forEach(function(x) {
      h += '<div style="font-size:11px;color:#4B5563;padding:3px 0;border-bottom:1px dotted #E4E6EA">・' + x.p.name + '（' + x.p.unit + '）<span style="color:#5B21B6;font-weight:700"> ' + Math.round(x.rate*100) + '%</span></div>';
    });
    if (c.pjU.length > 5) h += '<div style="font-size:11px;color:#9CA3AF;padding:3px 0">・ほか' + (c.pjU.length - 5) + '件</div>';

    // 要員
    h += '<div style="font-size:12px;font-weight:700;color:#0F9D6E;margin:10px 0 4px">👤 送る要員 ' + c.sfU.length + '名'
       + (c.sf.length > c.sfU.length ? '<span style="font-weight:400;color:#9CA3AF">（送信済 ' + (c.sf.length - c.sfU.length) + '名）</span>' : '') + '</div>';
    if (!c.sfU.length) h += '<div style="font-size:11px;color:#9CA3AF">未送信の要員はいません</div>';
    c.sfU.slice(0, 5).forEach(function(s) {
      h += '<div style="font-size:11px;color:#4B5563;padding:3px 0;border-bottom:1px dotted #E4E6EA">・' + s.name + '（' + s.unit_min + '万〜 / ' + s.start + '）'
         + (s.sheet_url ? '<span style="color:#0F9D6E"> 📄</span>' : '<span style="color:#D97706"> ⚠シート無</span>') + '</div>';
    });
    if (c.sfU.length > 5) h += '<div style="font-size:11px;color:#9CA3AF;padding:3px 0">・ほか' + (c.sfU.length - 5) + '名</div>';

    h += '<div style="display:flex;gap:6px;margin-top:10px">';
    if (c.pjU.length || c.sfU.length) {
      h += '<button class="btn btn-p" style="flex:1" onclick="copyAllForBP(\'' + esc + '\',\'both\')">📋 案件＋要員をまとめてコピー</button>';
    }
    h += '</div>';
    if (c.pjU.length && c.sfU.length) {
      h += '<div style="display:flex;gap:6px;margin-top:5px">'
         + '<button class="btn btn-d" style="flex:1;font-size:11px" onclick="copyAllForBP(\'' + esc + '\',\'proj\')">案件だけ</button>'
         + '<button class="btn btn-d" style="flex:1;font-size:11px" onclick="copyAllForBP(\'' + esc + '\',\'staff\')">要員だけ</button></div>';
    }
    h += '</div>';
    return h;
  }).join('');
}

// 1件ぶんの文面
function projText_(p) {
  var t = '【案件名】' + p.name + '\n';
  t += '【必須スキル】' + (p.skills || []).join('、') + '\n';
  if ((p.skills_pref || []).length) t += '【尚可スキル】' + p.skills_pref.join('、') + '\n';
  t += '【単価】' + p.unit + '\n';
  t += '【勤務形態】' + p.remote + (p.location ? '（' + p.location + '）' : '') + '\n';
  t += '【稼働開始】' + p.start + '\n';
  if (p.desc) t += '【詳細】\n' + p.desc + '\n';
  return t;
}
function staffText_(s) {
  var wp = s.work_pref === 'remote' ? 'リモート希望' : s.work_pref === 'onsite' ? '常駐希望' : '出社も可';
  var t = '【要員】' + s.name + '\n';
  t += '【スキル】' + (s.skills || []).join('、') + '\n';
  t += '【希望単価】' + s.unit_min + '万〜\n';
  t += '【稼働開始】' + s.start + '\n';
  t += '【勤務地】' + (s.location || '要相談') + '（' + wp + '）\n';
  if (s.desc) t += '【経歴】\n' + String(s.desc).slice(0, 800) + '\n';
  t += s.sheet_url ? '【スキルシート】別途お送りします\n' : '';
  return t;
}

// BPへ一斉送信（案件＋要員／案件のみ／要員のみ）
function copyAllForBP(bpName, kind) {
  var bp = BPS.filter(function(b) { return b.name === bpName; })[0];
  if (!bp) return;
  var ps = (kind === 'staff') ? [] : PROJECTS.filter(function(p) {
    return getSt('project', p.id) !== 'closed'
      && bpMatchRate_(p, bp) >= BP_THRESHOLD
      && !isSent_('案件', p.id, bpName);
  });
  var ss = (kind === 'proj') ? [] : STAFF.filter(function(s) {
    return getSt('staff', s.id) !== 'closed'
      && s.source !== bpName
      && !isSent_('要員', s.id, bpName);
  });
  if (!ps.length && !ss.length) return;

  var t = 'お世話になっております。株式会社SKETです。\n案件・要員情報をお送りいたします。\n\n';
  if (ps.length) {
    t += '━━━━━━━━━━━━━━━\n【案件情報】' + ps.length + '件\n━━━━━━━━━━━━━━━\n';
    t += 'ご対応可能な要員がいらっしゃいましたら、スキルシートをお送りください。\n\n';
    ps.forEach(function(p, i) { t += '◆' + (i+1) + '\n' + projText_(p) + '\n'; });
  }
  if (ss.length) {
    t += '━━━━━━━━━━━━━━━\n【要員情報】' + ss.length + '名\n━━━━━━━━━━━━━━━\n';
    t += 'ご紹介可能な案件がございましたらご連絡ください。\n\n';
    ss.forEach(function(s, i) { t += '◆' + (i+1) + '\n' + staffText_(s) + '\n'; });
  }
  t += '━━━━━━━━━━━━━━━\n引き続きよろしくお願いいたします。\n株式会社SKET';

  navigator.clipboard.writeText(t).then(function() {
    var items = ps.map(function(p) { return { kind:'案件', id:p.id, name:p.name }; })
      .concat(ss.map(function(s) { return { kind:'要員', id:s.id, name:s.name }; }));
    items.forEach(function(x) { SENT[x.kind + '_' + x.id + '_' + bpName] = new Date().toLocaleDateString('ja-JP'); });
    if (GAS_URL) {
      fetch(GAS_URL, { method:'POST', headers:{'Content-Type':'text/plain'},
        body: JSON.stringify({ type:'bpsent', bp: bpName, items: items }) });
    }
    renderBP();
    alert('案件' + ps.length + '件・要員' + ss.length + '名の文面をコピーしました。\nLINEに貼り付けてください。\n（すべて「' + bpName + 'へ送信済み」として記録しました）');
  });
}

// 新規BP打診用（1案件のみ・記録はしない）
function copyOneProj(pid) {
  var p = PROJECTS.filter(function(x) { return x.id === pid; })[0];
  if (!p) return;
  var t = 'お世話になっております。株式会社SKETです。\nご紹介可能な案件をお送りいたします。\n\n'
        + projText_(p)
        + '\nご対応可能な要員がいらっしゃいましたら、スキルシートをお送りください。\nよろしくお願いいたします。';
  navigator.clipboard.writeText(t).then(function() { alert('文面をコピーしました。'); });
}

// ===========================================================================
// スキルシート：ファイルアップロード ／ リンク貼り付け の両対応
//   BPからはファイル添付で来ることもURLで共有されることもあるため両方受ける
// ===========================================================================
function uploadSheet(staffId, inputEl) {
  var f = inputEl.files && inputEl.files[0];
  if (!f) return;
  if (!GAS_URL) { alert('GAS URLが未設定のためアップロードできません'); return; }
  if (f.size > 10 * 1024 * 1024) { alert('ファイルサイズは10MBまでにしてください'); return; }
  var s = STAFF.filter(function(x) { return x.id === staffId; })[0];
  if (!s) return;
  var lbl = inputEl.parentNode.querySelector('.shlbl');
  if (lbl) lbl.textContent = 'アップロード中...';

  var rd = new FileReader();
  rd.onload = function() {
    fetch(GAS_URL, { method:'POST', headers:{'Content-Type':'text/plain'},
      body: JSON.stringify({ type:'upload', staffId:staffId, staffName:s.name, source:s.source,
        filename:f.name, mimeType:f.type, dataB64:String(rd.result).split(',')[1] })
    }).then(function(r) { return r.json(); }).then(function(d) {
      if (d.success && d.url) { s.sheet_url = d.url; applySFilter(); alert('スキルシートをDriveに保存しました'); }
      else { alert('保存に失敗しました: ' + (d.error || '不明')); if (lbl) lbl.textContent = '📎 ファイルを添付'; }
    }).catch(function(e) { alert('保存に失敗: ' + e); if (lbl) lbl.textContent = '📎 ファイルを添付'; });
  };
  rd.readAsDataURL(f);
}

// リンク（Drive共有URL等）で来た場合
function linkSheet(staffId) {
  var s = STAFF.filter(function(x) { return x.id === staffId; })[0];
  if (!s) return;
  var url = prompt('スキルシートのURLを貼り付けてください\n（Google Drive、Dropbox、ギガファイル便などの共有リンク）', s.sheet_url || '');
  if (url === null) return;
  url = url.trim();
  if (url && !/^https?:\/\//.test(url)) { alert('http:// または https:// で始まるURLを入力してください'); return; }
  if (!GAS_URL) { alert('GAS URLが未設定のため保存できません'); return; }
  fetch(GAS_URL, { method:'POST', headers:{'Content-Type':'text/plain'},
    body: JSON.stringify({ type:'sheeturl', staffId:staffId, url:url })
  }).then(function(r) { return r.json(); }).then(function(d) {
    if (d.success) { s.sheet_url = url; applySFilter(); alert(url ? 'スキルシートのURLを登録しました' : 'URLを削除しました'); }
    else alert('保存に失敗しました: ' + (d.error || '不明'));
  }).catch(function(e) { alert('保存に失敗: ' + e); });
}

// ===========================================================================
// 単価バッジ
//   「単価オーバーでも提案が通ることがある」ため、除外はせず色分けして見せる。
//   diff = 案件の上限単価 − 要員の希望単価
//     +  … 粗利。そのまま提案できる
//     -10万以内 … 交渉圏（実績上ここは通ることがある）
//     -25万以内 … 要相談
//     それ以上  … 現実的でない
//     null      … 案件単価が「スキル見合い」等で未定 → 交渉余地は大きい
// ===========================================================================
function unitDiff_(s, p) {
  var umax = (typeof p.unit_max === 'number' && p.unit_max > 0) ? p.unit_max : null;
  var umin = (typeof s.unit_min === 'number' && s.unit_min > 0) ? s.unit_min : null;
  if (umax === null || umin === null) return null;
  return umax - umin;
}
// 'fit'(単価内) / 'nego'(交渉圏) / 'talk'(要相談) / 'over'(現実的でない) / 'unknown'(未定)
function unitClass_(d) {
  if (d === null) return 'unknown';
  if (d >= 0)   return 'fit';
  if (d >= -10) return 'nego';
  if (d >= -25) return 'talk';
  return 'over';
}
var UNIT_STYLE = {
  fit:     { bg:'#E8F7F2', fg:'#0F7A57', icon:'●' },
  nego:    { bg:'#FEF3C7', fg:'#B45309', icon:'●' },
  talk:    { bg:'#FFEDD5', fg:'#C2410C', icon:'●' },
  over:    { bg:'#FEE2E2', fg:'#B91C1C', icon:'●' },
  unknown: { bg:'#F3F4F6', fg:'#4B5563', icon:'○' }
};
function unitLabel_(d) {
  var c = unitClass_(d);
  if (c === 'unknown') return '単価未定（交渉余地あり）';
  if (c === 'fit')     return '粗利 +' + d + '万';
  if (c === 'nego')    return '要交渉 ' + (-d) + '万オーバー';
  if (c === 'talk')    return '要相談 ' + (-d) + '万オーバー';
  return (-d) + '万オーバー';
}
function unitBadge_(s, p) {
  var d = unitDiff_(s, p);
  var c = unitClass_(d);
  var st = UNIT_STYLE[c];
  return '<span class="ubadge" style="background:' + st.bg + ';color:' + st.fg + '">'
    + st.icon + ' ' + unitLabel_(d) + '</span>';
}

function doTab(el) { var name = el.getAttribute("data-tab");
  document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('on'); });
  document.querySelectorAll('.sec').forEach(function(s2) { s2.classList.remove('on'); });
  el.classList.add('on');
  document.getElementById('tab-' + name).classList.add('on');
}

function srcBadge_(r) {
  return r.src === 'ai'
    ? '<span class="srcb ai" title="' + (r.reason||'') + '">AI採点</span>'
    : '<span class="srcb rule">ルール（AI未採点）</span>';
}
function bar_(label, val, max, col) {
  return '<div class="brow"><span class="blbl">' + label + '</span><div class="bout"><div class="bin" style="width:'
    + (val/max*100) + '%;background:' + col + '"></div></div><span class="bval">' + val + '/' + max + '</span></div>';
}
function mkCard(r, i, sId, pId, isMatch) {
  var obj  = isMatch ? r.p : r.s;
  var col  = scColor_(r.total);
  var rc   = i===0?'r1':i===1?'r2':i===2?'r3':'';
  var fr   = getFresh(isMatch ? (r.p.date||'') : (r.s.date||''));
  var st   = getSt(isMatch ? 'project' : 'staff', obj.id);
  var stType = isMatch ? 'project' : 'staff';
  var htags = r.hit.map(function(sk) { return '<span class="stag hit">✓ ' + sk + '</span>'; }).join('');
  var ptags = (r.part||[]).map(function(sk) { return '<span class="stag part">△ ' + sk + '</span>'; }).join('');
  var mtags = r.miss.map(function(sk) { return '<span class="stag miss">✕ ' + sk + '</span>'; }).join('');
  var meta = isMatch
    ? '<span>単価: <strong>' + obj.unit + '</strong></span><span>勤務: <strong>' + obj.remote + (obj.location?'／'+obj.location:'') + '</strong></span><span>稼働: <strong>' + obj.start + '</strong></span><span>元: <strong>' + obj.source + '</strong></span>'
    : '<span>単価: <strong>' + obj.unit_min + '万〜</strong></span><span>リモート: <strong>' + (obj.remote?'希望':'常駐可') + '</strong></span><span>稼働: <strong>' + obj.start + '</strong></span><span>BP: <strong>' + obj.source + '</strong></span>';
  var notes = [r.locNote, r.unitNote, r.timeNote].filter(Boolean)
    .map(function(n) { return '<div style="font-size:11px;color:#D97706;margin-top:3px">⚠ ' + n + '</div>'; }).join('');

  var h = '<div class="sc" style="' + (st==='closed'?'opacity:0.4':'') + '" onclick="openDet(' + sId + ',' + pId + ',' + isMatch + ')">';
  h += '<div class="sc-top"><div class="sc-rank ' + rc + '">' + (i+1) + '</div><div class="sc-name">' + obj.name + '</div>';
  h += '<div class="sc-score" style="color:' + col + '">' + r.total + '<span style="font-size:12px;font-weight:400">点</span></div></div>';
  h += '<div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:6px;align-items:center">' + unitBadge_(r.s, r.p) + srcBadge_(r) + propBtn_(r.p.id, r.s.id) + '</div>';
  if (r.src === 'ai' && r.reason) h += '<div style="font-size:11px;color:#4B5563;background:#F7F8FA;border-radius:6px;padding:6px;margin-bottom:6px">' + r.reason + '</div>';
  h += bar_('スキル', r.skillPts, 50, col);
  h += bar_('単価',   r.unitPts,  20, col);
  h += bar_('時期',   r.timePts,  15, col);
  h += bar_('働き方', r.workPts,  15, col);
  h += '<div class="sc-tags">' + htags + ptags + mtags + '</div>';
  h += '<div style="display:flex;gap:6px;margin-top:6px;align-items:center"><span class="fb ' + fr.cls + '">' + fr.label + '</span>';
  h += '<button class="stbtn ' + stCls2(st) + '" data-type="' + stType + '" data-id="' + obj.id + '" onclick="event.stopPropagation();cycleStBtn(this)">' + stLbl(st) + '</button></div>';
  h += '<div class="sc-meta">' + meta + '</div>' + notes;
  if (obj.desc) {
    var descElId = (isMatch ? 'mcdesc-p-' : 'mcdesc-s-') + obj.id + '-' + i;
    h += '<div onclick="event.stopPropagation()"><button class="desctoggle" onclick="toggleDesc(\'' + descElId + '\',this)">▼ 概要を見る</button>';
    h += '<div class="descbox" id="' + descElId + '">' + obj.desc + '</div></div>';
  }
  h += '<div class="sc-act" onclick="event.stopPropagation()"><button class="btn btn-d" onclick="openDet(' + sId + ',' + pId + ',' + isMatch + ')">詳細を見る</button></div>';
  h += '</div>';
  return h;
}

// ===========================================================================
// 🔥 ホットマッチ：全案件 × 全要員を横断し、スコアの高い組み合わせを抽出
//   単価オーバーでも提案が通ることがあるため、除外はせず「色分け＋並べ替え」で見せる
// ===========================================================================
var hotState = { min: 75, q: '', src: '', unit: '', prop: '未提案', sort: 'score', limit: 60 };

function renderHot() {
  var grid = document.getElementById('hotgrid');
  var info = document.getElementById('hotinfo');
  var sum  = document.getElementById('hotsum');
  if (!grid) return;
  if (!PROJECTS.length || !STAFF.length) { grid.innerHTML = '<div class="empty">データがありません</div>'; return; }

  var ps = PROJECTS.filter(function(p) { return getSt('project', p.id) !== 'closed'; });
  var ss = STAFF.filter(function(s) { return getSt('staff', s.id) !== 'closed'; });

  var all = [], aiCnt = 0;
  ps.forEach(function(p) {
    ss.forEach(function(s) {
      var r = getScore(s, p);
      if (r.src === 'ai') aiCnt++;
      if (r.total < hotState.min) return;
      var d = unitDiff_(s, p), uc = unitClass_(d);
      all.push({ p: p, s: s, r: r, d: d, uc: uc });
    });
  });

  // 単価区分ごとの件数（フィルタ前の全体像を常に見せる）
  var seg = { fit:0, nego:0, talk:0, over:0, unknown:0 };
  var pr = { '未提案':0, '提案中':0, '成約':0, '見送り':0, '単価NG':0 };
  all.forEach(function(x) { seg[x.uc]++; pr[getProp(x.p.id, x.s.id)]++; });
  sum.innerHTML =
      '<span style="background:#E8F7F2;color:#0F7A57">● 単価内 ' + seg.fit + '</span>'
    + '<span style="background:#FEF3C7;color:#B45309">● 交渉圏 ' + seg.nego + '</span>'
    + '<span style="background:#FFEDD5;color:#C2410C">● 要相談 ' + seg.talk + '</span>'
    + '<span style="background:#FEE2E2;color:#B91C1C">● 大幅超過 ' + seg.over + '</span>'
    + '<span style="background:#F3F4F6;color:#4B5563">○ 単価未定 ' + seg.unknown + '</span>'
    + '<span style="background:#EDE9FE;color:#5B21B6;margin-left:8px">提案状況　未提案 ' + pr['未提案']
    + ' ／ 提案中 ' + pr['提案中'] + ' ／ 成約 ' + pr['成約'] + ' ／ 見送り ' + pr['見送り'] + '</span>';

  // 絞り込み
  var list = all.filter(function(x) {
    if (hotState.prop && getProp(x.p.id, x.s.id) !== hotState.prop) return false;
    if (hotState.src && x.r.src !== hotState.src) return false;
    if (hotState.unit === 'fit'     && x.uc !== 'fit') return false;
    if (hotState.unit === 'nego'    && x.uc !== 'nego') return false;
    if (hotState.unit === 'unknown' && x.uc !== 'unknown') return false;
    if (hotState.unit === 'fitnego' && x.uc !== 'fit' && x.uc !== 'nego') return false;
    if (hotState.q) {
      var q = hotState.q.toLowerCase();
      var hay = (x.p.name + ' ' + x.s.name + ' ' + x.s.source + ' ' + (x.p.skills||[]).join(' ') + ' ' + (x.s.skills||[]).join(' ')).toLowerCase();
      if (hay.indexOf(q) < 0) return false;
    }
    return true;
  });

  // 並べ替え
  if (hotState.sort === 'profit') {
    // 粗利が大きい順（単価未定・オーバーは後ろへ）
    list.sort(function(a, b) {
      var av = (a.d === null || a.d < 0) ? -9999 : a.d;
      var bv = (b.d === null || b.d < 0) ? -9999 : b.d;
      if (bv !== av) return bv - av;
      return b.r.total - a.r.total;
    });
  } else if (hotState.sort === 'close') {
    // 惜しい順：オーバー額が小さいものを上に（＝押せば通る可能性が高い順）
    list.sort(function(a, b) {
      var av = (a.d === null) ? -999 : (a.d < 0 ? a.d : 999);  // オーバーのみ対象。単価内は後ろ
      var bv = (b.d === null) ? -999 : (b.d < 0 ? b.d : 999);
      if (bv !== av) return bv - av;
      return b.r.total - a.r.total;
    });
  } else {
    list.sort(function(a, b) { return b.r.total - a.r.total; });
  }

  var total = ps.length * ss.length;
  info.innerHTML = '有効案件 <strong>' + ps.length + '</strong>件 × 有効要員 <strong>' + ss.length + '</strong>名 = '
    + total.toLocaleString() + 'ペア中、<strong>' + hotState.min + '点以上：' + all.length + '件</strong>'
    + (list.length !== all.length ? '（絞り込み後 <strong>' + list.length + '件</strong>）' : '')
    + ' ／ AI採点済 ' + aiCnt.toLocaleString() + 'ペア'
    + '<div style="margin-top:3px;font-size:11px;color:#9CA3AF">※単価オーバーでも提案が通る場合があるため、初期状態では除外していません</div>';

  var shown = list.slice(0, hotState.limit);
  if (!shown.length) { grid.innerHTML = '<div class="empty">条件に合う組み合わせがありません。マッチ度や単価の条件を緩めてください。</div>'; return; }

  grid.innerHTML = shown.map(function(x, i) {
    var r = x.r, col = scColor_(r.total);
    var tags = r.hit.slice(0, 6).map(function(sk) { return '<span class="stag hit">✓ ' + sk + '</span>'; }).join('')
             + (r.part||[]).slice(0, 3).map(function(sk) { return '<span class="stag part">△ ' + sk + '</span>'; }).join('');
    var h = '<div class="card" style="cursor:pointer;border-left:4px solid ' + col + '" onclick="openDet(' + x.s.id + ',' + x.p.id + ',true)">';
    h += '<div class="ct"><div style="font-size:12px;color:#6B7280">#' + (i+1) + '</div>';
    h += '<div style="font-size:22px;font-weight:800;color:' + col + '">' + r.total + '<span style="font-size:11px;font-weight:400">点</span></div></div>';
    h += '<div style="font-size:13px;font-weight:700;line-height:1.4;margin-bottom:2px">' + x.p.name + '</div>';
    h += '<div style="font-size:12px;color:#6B7280;margin-bottom:6px">⇔ <strong style="color:#7C3AED">' + x.s.name + '</strong>（' + x.s.source + '）</div>';
    h += '<div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:6px;align-items:center">' + unitBadge_(x.s, x.p) + srcBadge_(r) + propBtn_(x.p.id, x.s.id) + '</div>';
    if (r.src === 'ai' && r.reason) h += '<div style="font-size:11px;color:#4B5563;background:#F7F8FA;border-radius:6px;padding:6px;margin-bottom:6px">' + r.reason + '</div>';
    h += '<div class="sc-tags">' + tags + '</div>';
    h += '<div class="mr" style="margin-top:8px;padding-top:8px;border-top:1px solid #E4E6EA">';
    h += '<div class="meta">案件単価: <strong>' + x.p.unit + '</strong></div>';
    h += '<div class="meta">要員希望: <strong>' + x.s.unit_min + '万〜</strong></div>';
    h += '<div class="meta">勤務: <strong>' + x.p.remote + '</strong></div></div>';
    h += '</div>';
    return h;
  }).join('');
}

function cycleStBtn(btn) {
  var type = btn.getAttribute("data-type");
  var id   = parseInt(btn.getAttribute("data-id"));
  cycleSt2(type, id, btn);
}
function cycleSt2(type, id, btn) {
  var cur = getSt(type, id);
  var next = cur === 'active' ? 'proposing' : cur === 'proposing' ? 'closed' : 'active';
  setSt(type, id, next);
  btn.textContent = stLbl(next);
  btn.className = 'stbtn ' + stCls2(next);
}

// マッチング・逆引き検索タブの左側リスト用の状態（検索語＋登録日からの経過＋終了非表示トグル）
var matchStaffState = {q:'', fresh:'', hideClosed:true};
var revProjState = {q:'', fresh:'', hideClosed:true};
var MATCH_COUNT = 8, REV_COUNT = 8;

function matchesFresh(dateStr, fv) {
  if (!fv) return true;
  var f = getFresh(dateStr||'');
  if (fv === 'new') return f.days >= 0 && f.days <= 14;
  if (fv === 'warn') return f.days > 14 && f.days <= 30;
  if (fv === 'old') return f.days > 30 || f.days === -1;
  return true;
}
function applyMatchStaffFilter() {
  var list = STAFF.filter(function(s) {
    if (matchStaffState.hideClosed && getSt('staff', s.id) === 'closed') return false;
    if (!matchesFresh(s.date, matchStaffState.fresh)) return false;
    return matchesQ(s, matchStaffState.q);
  });
  renderSL(list);
}
function applyRevProjFilter() {
  var list = PROJECTS.filter(function(p) {
    if (revProjState.hideClosed && getSt('project', p.id) === 'closed') return false;
    if (!matchesFresh(p.date, revProjState.fresh)) return false;
    return matchesQ(p, revProjState.q);
  });
  renderPL(list);
}
function renderSL(list) {
  var h = list.length ? list.map(function(s) {
    return '<div class="pli" onclick="pickS(' + s.id + ')" id="sli-' + s.id + '"><div class="pli-n">' + s.name + '</div><div class="pli-s">' + (s.skills||[]).slice(0,3).join(' . ') + (s.skills.length>3?' +'+( s.skills.length-3):'') + ' | ' + s.unit_min + '万〜</div></div>';
  }).join('') : '<div class="empty">データなし</div>';
  document.getElementById('slst').innerHTML = h;
}
function pickS(id) {
  document.querySelectorAll('[id^="sli-"]').forEach(function(e) { e.classList.remove('on'); });
  var el = document.getElementById('sli-' + id); if (el) el.classList.add('on');
  var s = STAFF.find(function(x) { return x.id === id; }); if (!s) return;
  var res = PROJECTS.filter(function(p) { return getSt('project', p.id) !== 'closed'; }).map(function(p) {
    var sc = getScore(s, p);
    sc.p = p; sc.s = s;
    return sc;
  }).sort(function(a,b) { return b.total-a.total; }).slice(0, MATCH_COUNT);
  var h = '<div style="margin-bottom:12px;display:flex;align-items:center;gap:8px;flex-wrap:wrap">';
  h += '<span style="font-size:15px;font-weight:700">' + s.name + '</span>';
  h += '<span class="badge bg-g">' + s.unit_min + '万〜</span>';
  h += '<span class="badge bg-p">' + (s.remote?'リモート希望':'常駐可') + '</span></div>';
  h += '<div style="font-size:12px;color:#6B7280;margin-bottom:12px">スキル: ' + (s.skills||[]).join(' . ') + '</div>';
  h += '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">';
  h += '<span style="font-size:12px;font-weight:600;color:#6B7280">マッチング結果（上位' + res.length + '件）</span>';
  h += '<select class="si" style="width:110px" onchange="MATCH_COUNT=parseInt(this.value);pickS(' + id + ')">'
    + '<option value="8"' + (MATCH_COUNT===8?' selected':'') + '>上位8件</option>'
    + '<option value="15"' + (MATCH_COUNT===15?' selected':'') + '>上位15件</option>'
    + '<option value="30"' + (MATCH_COUNT===30?' selected':'') + '>上位30件</option>'
    + '<option value="999"' + (MATCH_COUNT===999?' selected':'') + '>全件</option></select></div>';
  h += '<div class="sc-list">' + res.map(function(r,i) { return mkCard(r,i,s.id,r.p.id,true); }).join('') + '</div>';
  document.getElementById('mres').innerHTML = h;
}

function renderPL(list) {
  var h = list.length ? list.map(function(p) {
    return '<div class="pli" onclick="pickP(' + p.id + ')" id="pli-' + p.id + '"><div class="pli-n">' + p.name + '</div><div class="pli-s">' + (p.skills||[]).slice(0,2).join(' . ') + ' | ' + p.unit + '</div></div>';
  }).join('') : '<div class="empty">データなし</div>';
  document.getElementById('plst').innerHTML = h;
}
function pickP(id) {
  document.querySelectorAll('[id^="pli-"]').forEach(function(e) { e.classList.remove('on'); });
  var el = document.getElementById('pli-' + id); if (el) el.classList.add('on');
  var p = PROJECTS.find(function(x) { return x.id === id; }); if (!p) return;
  var res = STAFF.filter(function(s) { return getSt('staff', s.id) !== 'closed'; }).map(function(s) {
    var sc = getScore(s, p);
    sc.p = p; sc.s = s;
    return sc;
  }).sort(function(a,b) { return b.total-a.total; }).slice(0, REV_COUNT);
  var h = '<div style="margin-bottom:12px;display:flex;align-items:center;gap:8px;flex-wrap:wrap">';
  h += '<span style="font-size:15px;font-weight:700">' + p.name + '</span>';
  h += '<span class="badge bg-a">' + p.unit + '</span>';
  h += '<span class="badge bg-p">' + p.remote + '</span></div>';
  h += '<div style="font-size:12px;color:#6B7280;margin-bottom:12px">必須スキル: ' + (p.skills||[]).join(' . ') + '</div>';
  h += '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">';
  h += '<span style="font-size:12px;font-weight:600;color:#6B7280">合う要員（上位' + res.length + '名）</span>';
  h += '<select class="si" style="width:110px" onchange="REV_COUNT=parseInt(this.value);pickP(' + id + ')">'
    + '<option value="8"' + (REV_COUNT===8?' selected':'') + '>上位8名</option>'
    + '<option value="15"' + (REV_COUNT===15?' selected':'') + '>上位15名</option>'

// 一覧の検索語・複数フィルター・並び替えをまとめて保持する状態（各条件はAND、値が空なら無視）
var pFilterState = {q:'', remote:'', status:'', fresh:'', sort:'new'};
var sFilterState = {q:'', remote:'', status:'', fresh:'', sort:'new'};

function sortList(list, sortKey, unitField) {
  var arr = list.slice();
  if (sortKey === 'unit_desc') arr.sort(function(a,b) { return (b[unitField]||0) - (a[unitField]||0); });
  else if (sortKey === 'unit_asc') arr.sort(function(a,b) { return (a[unitField]||0) - (b[unitField]||0); });
  else if (sortKey === 'name') arr.sort(function(a,b) { return a.name.localeCompare(b.name, 'ja'); });
  else { // 'new'（デフォルト）：更新が新しい順。日付不明は末尾に回す
    arr.sort(function(a,b) {
      var fa = getFresh(a.date||''), fb = getFresh(b.date||'');
      var da = fa.days === -1 ? 9999 : fa.days, db = fb.days === -1 ? 9999 : fb.days;
      return da - db;
    });
  }
  return arr;
}
function matchesQ(x, q) {
  if (!q) return true;
  var f = q.toLowerCase();
  return x.name.toLowerCase().indexOf(f) >= 0 || (x.skills||[]).some(function(s) { return s.toLowerCase().indexOf(f) >= 0; });
}
function applyPFilter() {
  var fs = pFilterState;
  var list = PROJECTS.filter(function(p) {
    if (!matchesQ(p, fs.q)) return false;
    if (fs.remote) {
      var isR = /リモート|テレワーク/.test(p.remote||'');
      if (fs.remote === 'r' && !isR) return false;
      if (fs.remote === 's' && !/常駐/.test(p.remote||'')) return false;
    }
    if (fs.status && getSt('project', p.id) !== fs.status) return false;
    if (!matchesFresh(p.date, fs.fresh)) return false;
    return true;
  });
  renderPG(sortList(list, fs.sort, 'unit_max'));
}
function applySFilter() {
  var fs = sFilterState;
  var list = STAFF.filter(function(s) {
    if (!matchesQ(s, fs.q)) return false;
    if (fs.remote) {
      if (fs.remote === 'r' && !s.remote) return false;
      if (fs.remote === 's' && s.remote) return false;
    }
    if (fs.status && getSt('staff', s.id) !== fs.status) return false;
    if (!matchesFresh(s.date, fs.fresh)) return false;
    return true;
  });
  renderSG(sortList(list, fs.sort, 'unit_min'));
}

function parseAll() {
  // AIの応答テキストは、まれに文字列リテラル内に生の改行/タブ等の制御文字を含んで返ってくることがあり、
  // そのままではJSON.parseが「Unterminated string in JSON」で失敗する。
  // この関数はダブルクォート文字列の"中"だけを対象に、生の制御文字を正規のJSONエスケープに変換する。
  function sanitizeJsonRaw_(str) {
    var out = '', inStr = false, esc = false;
    for (var i = 0; i < str.length; i++) {
      var ch = str[i];
      if (inStr) {
        if (esc) { out += ch; esc = false; continue; }
        if (ch === '\\') { out += ch; esc = true; continue; }
        if (ch === '"') { inStr = false; out += ch; continue; }
        if (ch === '\n') { out += '\\n'; continue; }
        if (ch === '\r') { continue; }
        if (ch === '\t') { out += '\\t'; continue; }
        out += ch;
      } else {
        if (ch === '"') { inStr = true; }
        out += ch;
      }
    }
    return out;
  }
  var text = document.getElementById('allta').value.trim();
  var rs = document.getElementById('allpr');
  var cnt = document.getElementById('allcnt');
  if (!text) { alert('テキストを貼り付けてください'); return; }
  rs.className = 'pr show'; rs.textContent = 'AIが解析・識別中...';
  cnt.textContent = ''; document.getElementById('allprev').style.display = 'none';

  var prompt = 'SES案件・要員情報のテキストからすべての情報を抽出してJSONで返してください（説明なし・JSONのみ）。\n\n'
    + '{"projects":[{"name":"(案件名)","skills":["(必須スキル)"],"skills_pref":["(尚可スキル)"],"unit":"(単価の金額表記。例:80万円 のように必ずテキスト中の実際の数値を書き写す。ラベルや説明文はここに入れない)","unit_max":数値またはnull,"remote":"リモートまたはハイブリッドまたは常駐","location":"勤務先の都道府県（例:東京都）","start":"(稼働開始時期)","source":"(情報元・BP名)","desc":"概要・仕事内容の説明文"}],'
    + '"staff":[{"name":"名前(年齢)","skills":["スキル"],"unit_min":数値,"remote":true,"start":"稼働開始","location":"都道府県","source":"所属企業","desc":"経歴・実績の説明文"}]}\n\n'
    + '【重要】上記のJSON例内の（）で書かれた説明は記述方法の説明です。そのままの文字列を出力してはいけません。必ずテキストの中から実際の値を抽出してください。特にunitフィールドに"単価"や"金額"のようなラベル名自体をそのまま入れることは禁止です。値が見つからない場合は空文字にしてください。\n\n'
    + '案件判断：案件名・必須スキル・単価・配信番号があれば案件。要員判断：氏名・スキル・希望単価があれば要員。\n\n'
    + '★★ skills（必須スキル）の抽出ルール ★★\n'
    + '・skills には「その案件で中核となる技術」だけを最大5個までに絞って入れてください。多くても6個です。\n'
    + '・具体的には、案件の中心となるプログラミング言語・フレームワーク・主要クラウドのみです（例："Java","Spring Boot","AWS"）。\n'
    + '・以下は skills に入れず、skills_pref または省略してください：\n'
    + '   - 尚可・歓迎・あれば尚可と明記されているもの → skills_pref へ\n'
    + '   - 補助的なツール類（Git, GitHub, GitLab, Jenkins, Figma, JIRA, Photoshop など）\n'
    + '   - 工程・プロセス用語（アジャイル, スクラム, テスト, 保守運用, ベンダーコントロール など）\n'
    + '   - 案件固有の業務用語（シミュレーションRPG, KPI設計, 事業企画 など）\n'
    + '・理由：必須スキルを20個も並べると「全部持っている人」が存在せず、マッチングが機能しなくなるためです。\n\n'
    + '【重要】unit_max は数値のみ。金額が特定できない場合（"スキル見合い"等）は必ず null にしてください。文字列を入れないでください。\n'
    + '【重要】remote は必ず "リモート" "ハイブリッド" "常駐" のいずれか1語にしてください。フルリモート・リモート可は"リモート"、一部リモート・週N出社は"ハイブリッド"、出社必須・リモート不可は"常駐"です。\n'
    + '【重要】location は必ず都道府県名（例:東京都、大阪府）に変換してください。駅名や地名しか書かれていない場合も都道府県に直してください（例:大手町→東京都、長岡京→京都府）。フルリモートで勤務地の指定がない場合のみ空文字にしてください。\n'
    + '【重要】要員の remote は、リモート勤務を希望している場合のみ true、常駐可・出社可なら false にしてください。\n'
    + '【重要】各スキル要素は必ず20文字以内の短い単語にしてください。\n'
    + '【重要】【概要】【工程】【期間】【人数】【面談】【精算】【備考】などの説明ブロックはskillsに入れず、元の文章のまま"desc"にまとめて入れてください（改行は必ず\\nとしてエスケープ）。該当がなければdescは空文字。\n'
    + '【重要】案件名が明記されていない場合は、本文から「〇〇開発」のような簡潔な仮の案件名を推測してつけてください。\n'
    + '【重要】単価の記載が複数箇所にある場合（SNS投稿用の宣伝文と、【単価】等が並ぶ正式な案件詳細）、正式な詳細部分の金額を優先してください。\n\nテキスト:\n' + text;

  callClaude(prompt).then(function(raw) {
    var cleaned = raw; while(cleaned.indexOf('\x60\x60\x60') >= 0) { cleaned = cleaned.replace('\x60\x60\x60json','').replace('\x60\x60\x60',''); } cleaned = cleaned.trim();
    var parsed;
    try {
      parsed = JSON.parse(cleaned);
    } catch (e1) {
      // AIが指示に反して文字列内に生の改行等を含めた場合の保険。
      // JSON文字列リテラルの中だけを対象に、生の制御文字を\n等へエスケープしてから再パースする。
      try {
        parsed = JSON.parse(sanitizeJsonRaw_(cleaned));
      } catch (e2) {
        rs.textContent = 'AIの応答をJSONとして解釈できませんでした。テキストを短く分けて再度お試しください。\n(詳細: ' + e2.message + ')';
        return;
      }
    }
    _pendP = parsed.projects || [];
    _pendP.forEach(function(pp) {
      // GAS側と同じ基準：数字を含まない単価(AIの抽出失敗等)は「スキル見合い」に統一
      if (pp.unit && !/\d/.test(pp.unit)) pp.unit = 'スキル見合い';
      // 型ガード：unit_max は数値か null のみ許可
      var um = Number(pp.unit_max);
      pp.unit_max = (isFinite(um) && um > 0) ? um : null;
      pp.skills_pref = cleanSkillArr_(pp.skills_pref);
    });
    _pendS = parsed.staff    || [];
    _pendSFiles = []; _pendSUrls = [];
    var total = _pendP.length + _pendS.length;
    if (total === 0) { rs.textContent = '案件・要員情報が見つかりませんでした。'; return; }
    rs.className = 'pr'; cnt.textContent = '案件' + _pendP.length + '件・要員' + _pendS.length + '名を検出';

    var ph = '';
    if (_pendP.length > 0) {
      ph += '<div style="margin-bottom:10px"><div style="font-size:12px;font-weight:600;color:#0F9D6E;margin-bottom:6px">案件 ' + _pendP.length + '件</div>';
      for (var i = 0; i < _pendP.length; i++) {
        var pp = _pendP[i]; var bc = pp.source ? '#E4E6EA' : '#DC2626';
        var pt = (pp.skills||[]).map(function(sk) { return '<span style="font-size:11px;padding:3px 8px;background:#E8F7F2;color:#0F9D6E;border-radius:20px">' + sk + '</span>'; }).join('');
        ph += '<div class="prev-item">';
        ph += '<div style="font-size:13px;font-weight:600;margin-bottom:6px">' + (i+1) + '. ' + pp.name + '</div>';
        ph += '<div style="display:flex;gap:10px;flex-wrap:wrap;font-size:12px;color:#6B7280;margin-bottom:8px"><span>単価: <strong>' + pp.unit + '</strong></span><span>勤務: <strong>' + pp.remote + (pp.location?'／'+pp.location:'') + '</strong></span><span>稼働: <strong>' + pp.start + '</strong></span></div>';
        ph += '<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px"><span style="font-size:12px;font-weight:600;color:#DC2626;white-space:nowrap">BP名 必須</span>';
        ph += '<input type="text" id="pp' + i + '" value="' + (pp.source||'') + '" placeholder="例：フリースタイル" style="flex:1;padding:5px 8px;border:1.5px solid ' + bc + ';border-radius:6px;font-size:13px;background:#fff" oninput="this.style.borderColor=this.value?\'#0F9D6E\':\'#DC2626\'"></div>';
        ph += '<div style="font-size:11px;color:#6B7280;margin-bottom:3px">必須スキル（' + (pp.skills||[]).length + '個）</div>';
        ph += '<div style="display:flex;flex-wrap:wrap;gap:4px">' + pt + '</div>';
        if ((pp.skills||[]).length > 7) {
          ph += '<div style="font-size:11px;color:#DC2626;margin-top:4px">⚠ 必須スキルが多すぎます（' + pp.skills.length + '個）。この人数を全て満たす要員は存在しない可能性が高く、マッチ度が不当に下がります</div>';
        }
        if ((pp.skills_pref||[]).length) {
          var pt2 = pp.skills_pref.map(function(sk) { return '<span style="font-size:11px;padding:3px 8px;background:#FFFBEB;color:#D97706;border-radius:20px">' + sk + '</span>'; }).join('');
          ph += '<div style="font-size:11px;color:#6B7280;margin:6px 0 3px">尚可スキル（' + pp.skills_pref.length + '個・加点のみ）</div>';
          ph += '<div style="display:flex;flex-wrap:wrap;gap:4px">' + pt2 + '</div>';
        }
        if (pp.desc) ph += '<div style="font-size:11px;color:#0F9D6E;margin-top:6px">✓ 概要文を抽出しました（' + pp.desc.length + '文字）</div>';
        ph += '</div>';
      }
      ph += '</div>';
    }

    var sh = '';
    if (_pendS.length > 0) {
      sh += '<div style="margin-bottom:10px"><div style="font-size:12px;font-weight:600;color:#7C3AED;margin-bottom:6px">要員 ' + _pendS.length + '名</div>';
      for (var j = 0; j < _pendS.length; j++) {
        var ps = _pendS[j]; var bc2 = ps.source ? '#E4E6EA' : '#DC2626';
        var st2 = (ps.skills||[]).map(function(sk) { return '<span style="font-size:11px;padding:3px 8px;background:#F5F3FF;color:#7C3AED;border-radius:20px">' + sk + '</span>'; }).join('');
        sh += '<div class="prev-item">';
        sh += '<div style="font-size:13px;font-weight:600;margin-bottom:6px">' + (j+1) + '. ' + ps.name + '</div>';
        sh += '<div style="display:flex;gap:10px;flex-wrap:wrap;font-size:12px;color:#6B7280;margin-bottom:8px"><span>単価: <strong>' + ps.unit_min + '万〜</strong></span><span>リモート: <strong>' + (ps.remote?'希望':'常駐可') + '</strong></span><span>稼働: <strong>' + ps.start + '</strong></span></div>';
        sh += '<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px"><span style="font-size:12px;font-weight:600;color:#DC2626;white-space:nowrap">BP名 必須</span>';
        sh += '<input type="text" id="ps' + j + '" value="' + (ps.source||'') + '" placeholder="例：ZINZAI" style="flex:1;padding:5px 8px;border:1.5px solid ' + bc2 + ';border-radius:6px;font-size:13px;background:#fff" oninput="this.style.borderColor=this.value?\'#0F9D6E\':\'#DC2626\'"></div>';
        sh += '<div style="display:flex;flex-wrap:wrap;gap:4px">' + st2 + '</div>';
        sh += '<div style="margin-top:8px;padding-top:8px;border-top:1px dashed #E4E6EA">'
            + '<div style="font-size:11px;color:#6B7280;margin-bottom:4px">スキルシート（任意）</div>'
            + '<label style="font-size:12px;color:#D97706;font-weight:600;cursor:pointer;margin-right:12px">'
            + '<span id="shn' + j + '">📎 ファイルを添付（xlsx / pdf）</span>'
            + '<input type="file" accept=".xlsx,.xls,.pdf,.docx" style="display:none" onchange="pickSheet(' + j + ',this)">'
            + '</label>'
            + '<input type="text" id="shu' + j + '" placeholder="🔗 または共有URLを貼り付け" style="width:100%;margin-top:5px;padding:5px 8px;border:1px solid #E4E6EA;border-radius:6px;font-size:12px;background:#fff">'
            + '</div>';
        if (ps.desc) sh += '<div style="font-size:11px;color:#7C3AED;margin-top:6px">✓ 概要文を抽出しました（' + ps.desc.length + '文字）</div>';
        sh += '</div>';
      }
      sh += '</div>';
    }

    document.getElementById('prevp').innerHTML = ph;
    document.getElementById('prevs').innerHTML = sh;
    document.getElementById('allprev').style.display = 'block';
  }).catch(function(e) { rs.textContent = 'エラー: ' + e.message; });
}

function confirmAdd() {
  var hasErr = false;
  for (var i = 0; i < _pendP.length; i++) {
    var el = document.getElementById('pp' + i);
    if (el) { var v = el.value.trim(); if (!v) { el.style.borderColor='#DC2626'; hasErr=true; } else { _pendP[i].source=v; } }
  }
  for (var j = 0; j < _pendS.length; j++) {
    var el2 = document.getElementById('ps' + j);
    if (el2) { var v2 = el2.value.trim(); if (!v2) { el2.style.borderColor='#DC2626'; hasErr=true; } else { _pendS[j].source=v2; } }
    var eu = document.getElementById('shu' + j);
    if (eu && eu.value.trim()) _pendSUrls[j] = eu.value.trim();   // リンクで来たスキルシート
  }
  if (hasErr) { alert('BP名が未入力の項目があります。赤枠の欄を入力してください。'); return; }

  document.getElementById('allprev').style.display = 'none';
  var rs = document.getElementById('allpr'); rs.className = 'pr show'; rs.textContent = '最新データを確認中...';
  var today = new Date().toLocaleDateString('ja-JP', {year:'numeric',month:'2-digit',day:'2-digit'});
  var addP=0, addS=0, savP=0, savS=0, upSheets=0;

  var doSave = function(type, item, cb) {
    if (GAS_URL) {
      fetch(GAS_URL, {method:'POST', headers:{'Content-Type':'text/plain'}, body:JSON.stringify({type:type,record:item})})
        .then(function(r) { return r.json(); })
        .then(function(d) { cb(true, d && d.id); }).catch(function() { cb(false); });
    } else { cb(false); }
  };

  // 要員登録の直後に、添付されたスキルシートをDriveへアップロードする
  var upQ = 0;
  function uploadPending(idx, serverId, item, next) {
    if (!GAS_URL || !serverId) { next(); return; }
    // ① リンクで共有された場合：URLをそのまま登録
    var u = _pendSUrls[idx];
    if (u) {
      fetch(GAS_URL, { method:'POST', headers:{'Content-Type':'text/plain'},
        body: JSON.stringify({ type:'sheeturl', staffId: serverId, url: u })
      }).then(function() { item.sheet_url = u; upSheets++; next(); }).catch(function() { next(); });
      return;
    }
    // ② ファイル添付の場合：Driveへアップロード
    var f = _pendSFiles[idx];
    if (!f) { next(); return; }
    upQ++;
    var rd = new FileReader();
    rd.onload = function() {
      fetch(GAS_URL, { method:'POST', headers:{'Content-Type':'text/plain'},
        body: JSON.stringify({ type:'upload', staffId: serverId, staffName: item.name,
          source: item.source, filename: f.name, mimeType: f.type,
          dataB64: String(rd.result).split(',')[1] })
      }).then(function(r){ return r.json(); }).then(function(d) {
        if (d && d.url) { item.sheet_url = d.url; upSheets++; }
        next();
      }).catch(function() { next(); });
    };
    rd.onerror = function() { next(); };
    rd.readAsDataURL(f);
  }

  // ID重複対策：追加処理の直前にサーバーの最新データを取得し、他の担当者が
  // 直前に登録したレコードのIDも踏まえて最大IDを再計算する（完全な排他制御ではないが、
  // タブを開いたまま長時間放置したケースでの衝突リスクを大きく減らせる）
  var maxPId = Math.max.apply(null, [0].concat(PROJECTS.map(function(x){return x.id;})));
  var maxSId = Math.max.apply(null, [0].concat(STAFF.map(function(x){return x.id;})));
  function refreshMaxIds(cb) {
    if (!GAS_URL) { cb(); return; }
    fetch(GAS_URL + '?type=all').then(function(r){ return r.json(); }).then(function(d) {
      (d.projects||[]).forEach(function(x){ if (x.id > maxPId) maxPId = x.id; });
      (d.staff||[]).forEach(function(x){ if (x.id > maxSId) maxSId = x.id; });
      cb();
    }).catch(function(){ cb(); });
  }

  var pi = 0;
  function addNextP() {
    if (pi >= _pendP.length) { addNextS(0); return; }
    var item = _pendP[pi];
    maxPId += 1; item.id = maxPId;
    item.date = today;
    item.skills = cleanSkillArr_(item.skills);
    item.skills_pref = cleanSkillArr_(item.skills_pref);
    PROJECTS.push(item); addP++; pi++;
    doSave('project', item, function(ok) { if(ok) savP++; addNextP(); });
  }
  function addNextS(si) {
    if (si >= _pendS.length) { done(); return; }
    var idx = si;
    var item = _pendS[idx];
    maxSId += 1; item.id = maxSId;
    item.date = today;
    item.skills = cleanSkillArr_(item.skills);
    STAFF.push(item); addS++; si++;
    doSave('staff', item, function(ok, serverId) {
      if (ok) savS++;
      if (serverId) item.id = serverId;   // GASが返した実際の行IDに合わせる
      uploadPending(idx, serverId, item, function() { addNextS(si); });
    });
  }
  function done() {
    applyPFilter(); applyRevProjFilter(); applySFilter(); applyMatchStaffFilter(); updateStats(); renderHot(); renderBP();
    var msg = GAS_URL ? 'スプレッドシートにも保存しました（案件'+savP+'件・要員'+savS+'名）' : 'スプレッドシートへの保存は設定タブでGAS URLを設定後に有効になります';
    rs.textContent = '追加完了！案件'+addP+'件・要員'+addS+'名をDBに追加しました\n' + msg
      + (upSheets ? '\nスキルシート ' + upSheets + '件をGoogle Driveに保存しました' : '')
      + '\n※マッチ度はすぐルールベースで表示されます。AIによる精査は深夜2時に自動実行され、翌朝スコアが更新されます。';
    document.getElementById('allta').value = ''; _pendP = []; _pendS = []; _pendSFiles = []; _pendSUrls = [];
  }
  rs.textContent = 'DBに追加中...';
  refreshMaxIds(addNextP);
}

loadData();
</script>
</body>
